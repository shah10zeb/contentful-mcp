name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-webapp:
    name: Test Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        # Continue if no lint script config is strict
        run: npm run lint || true
      - name: Run tests
        run: npm test
      - name: Build webapp
        run: npm run build

  test-mcp:
    name: Test MCP Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv pip install -e . --system
      - name: Verify python syntax
        run: python -m py_compile main.py

  mock-deploy:
    name: Mock Deploy
    runs-on: ubuntu-latest
    needs: [test-webapp, test-mcp]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy Start
        run: echo "🚀 Starting mock deployment to production..."
      - name: Wait for 'deployment'
        run: sleep 5
      - name: Deploy Successful
        run: echo "✅ Successfully deployed contentful-mcp and webapp!"
